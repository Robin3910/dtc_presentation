<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材详情 - AI 素材审核助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            
            --border-primary: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            --accent-cyan: #22d3ee;
            --accent-violet: #a78bfa;
            --accent-green: #4ade80;
            --accent-yellow: #facc15;
            --accent-red: #f87171;
            
            --gradient-primary: linear-gradient(135deg, #22d3ee 0%, #a78bfa 100%);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            
            --header-height: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(9, 9, 11, 0.8);
            border-bottom: 1px solid var(--border-primary);
            backdrop-filter: blur(16px);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
        }

        .nav {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent-cyan);
        }

        /* Main */
        .main {
            padding-top: calc(var(--header-height) + 32px);
            padding-bottom: 48px;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            word-break: break-all;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-primary);
            background: var(--bg-secondary);
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .card-body {
            padding: 20px;
        }

        /* Preview */
        .preview-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .preview-video {
            max-width: 100%;
            max-height: 400px;
        }

        .preview-placeholder {
            text-align: center;
            color: var(--text-muted);
            padding: 48px;
        }

        /* Info List */
        .info-list {
            display: flex;
            flex-direction: column;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-primary);
            gap: 16px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .info-value {
            font-size: 0.875rem;
            color: var(--text-primary);
            text-align: right;
            word-break: break-all;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
        }

        .badge-warning {
            background: rgba(250, 204, 21, 0.1);
            color: var(--accent-yellow);
        }

        .badge-danger {
            background: rgba(248, 113, 113, 0.1);
            color: var(--accent-red);
        }

        .badge-info {
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent-cyan);
        }

        .badge-default {
            background: var(--bg-tertiary);
            color: var(--text-muted);
        }

        /* Review Section */
        .review-section {
            margin-top: 16px;
        }

        .review-item {
            margin-bottom: 20px;
        }

        .review-item:last-child {
            margin-bottom: 0;
        }

        .review-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .review-content {
            font-size: 0.875rem;
            color: var(--text-primary);
        }

        /* List Items */
        .violations-list,
        .suggestions-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .violations-list li,
        .suggestions-list li {
            position: relative;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            padding-left: 20px;
        }

        .violations-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-red);
            border-radius: 3px 0 0 3px;
        }

        .suggestions-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-green);
            border-radius: 3px 0 0 3px;
        }

        .suggestions-list li:last-child,
        .violations-list li:last-child {
            margin-bottom: 0;
        }

        /* Raw Response */
        .raw-response {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            font-size: 0.8125rem;
            line-height: 1.7;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            color: var(--text-secondary);
        }

        /* No Review */
        .no-review {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .no-review-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--accent-cyan-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--accent-red);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 16px;
            }

            .nav {
                display: none;
            }

            .main {
                padding-left: 16px;
                padding-right: 16px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#22d3ee"/>
                                <stop offset="100%" stop-color="#a78bfa"/>
                            </linearGradient>
                        </defs>
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                AI 审核助手
            </a>
            <nav class="nav">
                <a href="/admin" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    概览
                </a>
                <a href="/admin/materials" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                        <polyline points="13 2 13 9 20 9"/>
                    </svg>
                    素材管理
                </a>
                <a href="/admin/reviews" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    审核记录
                </a>
            </nav>
        </div>
    </header>

    <main class="main">
        <a href="javascript:history.back()" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            返回
        </a>

        <h1 class="page-title" id="page-title">素材详情</h1>

        <div class="grid">
            <!-- Preview Card -->
            <div class="card">
                <div class="card-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span class="card-title">素材预览</span>
                </div>
                <div class="card-body">
                    <div class="preview-container" id="preview-container">
                        <div class="preview-placeholder">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- Info Card -->
            <div class="card">
                <div class="card-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    <span class="card-title">基本信息</span>
                </div>
                <div class="card-body">
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">文件名</span>
                            <span class="info-value" id="filename">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">上传者</span>
                            <span class="info-value" id="uploader">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">上传时间</span>
                            <span class="info-value" id="upload-time">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">文件大小</span>
                            <span class="info-value" id="file-size">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">素材状态</span>
                            <span class="info-value" id="status">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Review Card -->
        <div class="card">
            <div class="card-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span class="card-title">审核结果</span>
            </div>
            <div class="card-body">
                <div id="review-content">
                    <div class="no-review">
                        <div class="no-review-icon">🔍</div>
                        <p>暂无审核结果</p>
                    </div>
                </div>

                <div class="actions" id="actions">
                    <button class="btn btn-secondary" onclick="goBack()">返回列表</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const materialId = window.location.pathname.split('/').pop();

        async function loadMaterial() {
            try {
                const response = await fetch(`/api/materials/${materialId}`);
                const data = await response.json();

                if (data.success) {
                    renderMaterial(data.material, data.review, data.file_url);
                } else {
                    alert('加载失败: ' + data.message);
                    goBack();
                }
            } catch (error) {
                console.error('加载素材失败:', error);
                alert('加载素材失败');
            }
        }

        function renderMaterial(material, review, fileUrl) {
            // Update page title
            document.getElementById('page-title').textContent = material.original_filename;

            // Render preview
            const previewContainer = document.getElementById('preview-container');
            const isImage = material.mime_type && material.mime_type.startsWith('image/');

            if (isImage) {
                previewContainer.innerHTML = `<img src="${fileUrl}" alt="${material.original_filename}" class="preview-image">`;
            } else {
                previewContainer.innerHTML = `<video src="${fileUrl}" controls class="preview-video">您的浏览器不支持视频播放</video>`;
            }

            // Render basic info
            document.getElementById('filename').textContent = material.original_filename;
            document.getElementById('uploader').textContent = material.uploader_email || '-';
            document.getElementById('upload-time').textContent = new Date(material.upload_time).toLocaleString('zh-CN');
            document.getElementById('file-size').textContent = (material.file_size / 1024 / 1024).toFixed(2) + ' MB';

            const statusMap = {
                'pending': ['badge-default', '待处理'],
                'uploaded': ['badge-info', '已上传'],
                'reviewing': ['badge-warning', '审核中'],
                'reviewed': ['badge-success', '已审核']
            };
            const [badgeClass, statusText] = statusMap[material.status] || ['badge-default', material.status];
            document.getElementById('status').innerHTML = `<span class="badge ${badgeClass}">${statusText}</span>`;

            // Render review content
            const reviewContent = document.getElementById('review-content');
            const actions = document.getElementById('actions');

            if (review) {
                const statusMap = {
                    'pass': ['badge-success', '通过'],
                    'needs_revision': ['badge-warning', '需修改'],
                    'reject': ['badge-danger', '违规']
                };
                const [badgeClass, statusText] = statusMap[review.reviewer_result] || ['badge-success', review.reviewer_result];

                let violationsHtml = '';
                if (review.violations && review.violations.length > 0) {
                    violationsHtml = `
                        <div class="review-item">
                            <div class="review-label">违规条款</div>
                            <ul class="violations-list">
                                ${review.violations.map(v => `<li>${v}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                let suggestionsHtml = '';
                if (review.suggestions && review.suggestions.length > 0) {
                    suggestionsHtml = `
                        <div class="review-item">
                            <div class="review-label">修改建议</div>
                            <ul class="suggestions-list">
                                ${review.suggestions.map(s => `<li>${s}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                reviewContent.innerHTML = `
                    <div class="review-section">
                        <div class="review-item">
                            <div class="review-label">审核结论</div>
                            <div class="review-content"><span class="badge ${badgeClass}">${statusText}</span></div>
                        </div>
                        <div class="review-item">
                            <div class="review-label">审核时间</div>
                            <div class="review-content">${new Date(review.review_time).toLocaleString('zh-CN')}</div>
                        </div>
                        ${violationsHtml}
                        ${suggestionsHtml}
                        ${review.notes && review.notes.length > 0 ? `
                            <div class="review-item">
                                <div class="review-label">备注</div>
                                <div class="review-content">${review.notes.join(', ')}</div>
                            </div>
                        ` : ''}
                        <div class="review-item">
                            <div class="review-label">AI 审核详情</div>
                            <div class="raw-response">${review.raw_response || '无'}</div>
                        </div>
                    </div>
                `;

                actions.innerHTML = `
                    <button class="btn btn-secondary" onclick="goBack()">返回列表</button>
                    <button class="btn btn-danger" onclick="deleteMaterial()">删除素材</button>
                `;
            } else if (material.status === 'uploaded') {
                reviewContent.innerHTML = `
                    <div class="no-review">
                        <div class="no-review-icon">⏳</div>
                        <p>素材待审核</p>
                    </div>
                `;
                actions.innerHTML = `
                    <button class="btn btn-primary" onclick="triggerReview()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        立即审核
                    </button>
                    <button class="btn btn-secondary" onclick="goBack()">返回列表</button>
                    <button class="btn btn-danger" onclick="deleteMaterial()">删除素材</button>
                `;
            } else {
                actions.innerHTML = `
                    <button class="btn btn-secondary" onclick="goBack()">返回列表</button>
                    <button class="btn btn-danger" onclick="deleteMaterial()">删除素材</button>
                `;
            }
        }

        async function triggerReview() {
            if (!confirm('确定要立即触发审核吗？')) return;

            try {
                const response = await fetch(`/api/materials/${materialId}/review`, { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    alert('审核任务已触发');
                    loadMaterial();
                } else {
                    alert('触发审核失败: ' + data.message);
                }
            } catch (error) {
                alert('触发审核失败');
            }
        }

        async function deleteMaterial() {
            if (!confirm('确定要删除这个素材吗？')) return;

            try {
                const response = await fetch(`/api/materials/${materialId}`, { method: 'DELETE' });
                const data = await response.json();

                if (data.success) {
                    alert('删除成功');
                    goBack();
                } else {
                    alert('删除失败: ' + data.message);
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        function goBack() {
            window.location.href = '/admin/materials';
        }

        // Initialize
        loadMaterial();
    </script>
</body>
</html>
