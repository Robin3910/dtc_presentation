<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核记录 - AI 素材审核助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            
            --border-primary: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            --accent-cyan: #22d3ee;
            --accent-violet: #a78bfa;
            --accent-green: #4ade80;
            --accent-yellow: #facc15;
            --accent-red: #f87171;
            
            --gradient-primary: linear-gradient(135deg, #22d3ee 0%, #a78bfa 100%);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            
            --header-height: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(9, 9, 11, 0.8);
            border-bottom: 1px solid var(--border-primary);
            backdrop-filter: blur(16px);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
        }

        .nav {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent-cyan);
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        /* Main */
        .main {
            padding-top: calc(var(--header-height) + 32px);
            padding-bottom: 48px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .filters {
            display: flex;
            gap: 12px;
        }

        .filter-select {
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .filter-select option {
            background: var(--bg-secondary);
        }

        /* Table Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        .table th {
            text-align: left;
            padding: 14px 20px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
        }

        .table td {
            padding: 16px 20px;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border-primary);
            color: var(--text-secondary);
        }

        .table tr:last-child td {
            border-bottom: none;
        }

        .table tr:hover td {
            background: var(--bg-card);
        }

        .table .filename {
            color: var(--text-primary);
            font-weight: 500;
        }

        .table .violations {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
        }

        .badge-warning {
            background: rgba(250, 204, 21, 0.1);
            color: var(--accent-yellow);
        }

        .badge-danger {
            background: rgba(248, 113, 113, 0.1);
            color: var(--accent-red);
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            border-top: 1px solid var(--border-primary);
        }

        .pagination button {
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .info {
            padding: 0 16px;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 16px;
            }

            .nav {
                display: none;
            }

            .main {
                padding-left: 16px;
                padding-right: 16px;
            }

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .filters {
                flex-wrap: wrap;
            }

            .table th,
            .table td {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#22d3ee"/>
                                <stop offset="100%" stop-color="#a78bfa"/>
                            </linearGradient>
                        </defs>
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                AI 审核助手
            </a>
            <nav class="nav">
                <a href="/admin" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    概览
                </a>
                <a href="/admin/materials" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                        <polyline points="13 2 13 9 20 9"/>
                    </svg>
                    素材管理
                </a>
                <a href="/admin/reviews" class="nav-link active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    审核记录
                </a>
            </nav>
        </div>
        <div class="header-right">
            <button class="btn btn-secondary" onclick="location.reload()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                刷新
            </button>
            <button class="btn btn-secondary" onclick="logout()">退出</button>
        </div>
    </header>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">审核记录</h1>
            <div class="filters">
                <select class="filter-select" id="result-filter" onchange="loadReviews(1)">
                    <option value="">全部结果</option>
                    <option value="pass">通过</option>
                    <option value="needs_revision">需修改</option>
                    <option value="reject">违规</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table class="table" id="reviews-table">
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>上传者</th>
                            <th>审核结果</th>
                            <th>审核时间</th>
                            <th>违规条款</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="reviews-tbody">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="empty-icon">📋</div>
                                <p>加载中...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <script>
        let currentPage = 1;

        async function loadReviews(page = 1) {
            currentPage = page;
            const resultFilter = document.getElementById('result-filter').value;

            try {
                const response = await fetch(`/api/reviews?page=${page}&per_page=20&result=${resultFilter}`);
                const data = await response.json();

                if (data.reviews && data.reviews.length > 0) {
                    renderReviews(data.reviews);
                } else {
                    document.getElementById('reviews-tbody').innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <div class="empty-icon">📋</div>
                                    <p>暂无审核记录</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    document.getElementById('pagination').innerHTML = '';
                }
            } catch (error) {
                console.error('加载审核记录失败:', error);
            }
        }

        function renderReviews(reviews) {
            const tbody = document.getElementById('reviews-tbody');
            let html = '';

            reviews.forEach(review => {
                const statusMap = {
                    'pass': ['badge-success', '通过'],
                    'needs_revision': ['badge-warning', '需修改'],
                    'reject': ['badge-danger', '违规']
                };
                const [badgeClass, statusText] = statusMap[review.reviewer_result] || ['badge-success', review.reviewer_result];
                const reviewTime = new Date(review.review_time).toLocaleString('zh-CN');
                const violations = review.violations && review.violations.length > 0
                    ? review.violations.slice(0, 2).join(', ') + (review.violations.length > 2 ? '...' : '')
                    : '-';

                html += `
                    <tr>
                        <td class="filename">${review.filename}</td>
                        <td>${review.uploader_email || '-'}</td>
                        <td><span class="badge ${badgeClass}">${statusText}</span></td>
                        <td>${reviewTime}</td>
                        <td class="violations" title="${review.violations?.join('\n') || ''}">${violations}</td>
                        <td class="actions">
                            <button class="action-btn" onclick="viewReview(${review.material_id})">查看详情</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function viewReview(materialId) {
            window.location.href = `/admin/material/${materialId}`;
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // Initialize
        loadReviews(1);
    </script>
</body>
</html>
